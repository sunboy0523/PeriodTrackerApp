name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3.1.0
      with:
        cmdline-tools-version: 'latest'
        accept-android-sdk-licenses: true

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Generate Keystore
      run: |
        mkdir -p keystore
        keytool -genkey -v \
          -keystore keystore/periodtracker.keystore \
          -alias periodtracker \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -storepass periodtracker2024 \
          -keypass periodtracker2024 \
          -dname "CN=PeriodTracker, OU=Development, O=PeriodTracker, L=City, ST=State, C=CN"

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Build Signed Release APK
      env:
        KEYSTORE_PASSWORD: periodtracker2024
        KEY_ALIAS: periodtracker
        KEY_PASSWORD: periodtracker2024
      run: ./gradlew assembleRelease --no-daemon
      if: success()

    - name: Upload Signed Release APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: signed-release-apk
        path: app/build/outputs/apk/release/app-release.apk
        retention-days: 90

    - name: Rename APK for Release
      if: success()
      run: |
        mkdir -p release
        if [ -f app/build/outputs/apk/release/app-release.apk ]; then
          cp app/build/outputs/apk/release/app-release.apk release/PeriodTracker-v${{ github.run_number }}.apk
        fi
        if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
          cp app/build/outputs/apk/debug/app-debug.apk release/PeriodTracker-v${{ github.run_number }}-debug.apk
        fi

    - name: Create Release
      if: success() && github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        body: |
          🩷 经期助手 (PeriodTracker) v${{ github.run_number }}
          自动构建版本
        files: |
          release/PeriodTracker-v${{ github.run_number }}.apk
          release/PeriodTracker-v${{ github.run_number }}-debug.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
